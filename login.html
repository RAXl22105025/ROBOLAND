</body>

<script>
    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevents the page from refreshing

        // Grab the email and password from the form
        const inputs = document.querySelectorAll('input');
        const email = inputs[0].value;
        const password = inputs[1].value;

        try {
            const response = await fetch('[https://roboland-backend.onrender.com/api/login](https://roboland-backend.onrender.com/api/login)', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Save the username to the browser's local memory so we can use it later!
                localStorage.setItem('robolandUser', data.username);
                
                alert("Login successful! Welcome back.");
                window.location.href = "dashboard.html"; // Redirect to the student dashboard
            } else {
                alert("Error: " + data.error);
            }
        } catch (error) {
            console.error("Fetch error:", error);
            alert("Cannot reach the server. Is it running?");
        }
    });
</script>
