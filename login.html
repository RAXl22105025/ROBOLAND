<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOLAND | Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <!-- The Auth Container is now the only focus of the page -->
    <div class="auth-container">
        <div style="font-weight: 800; color: var(--primary); font-size: 24px; margin-bottom: 20px;">🤖 ROBOLAND</div>
        
        <h2>Sign in</h2>
        <p>Continue to your account</p>

        <form>
            <input type="email" class="auth-input" placeholder="Email Address" required>
            <input type="password" class="auth-input" placeholder="Password" required>
            <button type="submit" class="auth-btn" style="background-color: var(--primary); color: black;">Login</button>
        </form>

        <p style="margin-top: 25px; font-size: 14px;">
            Don't have an account? 
            <a href="register.html" style="color:#1a73e8; text-decoration: none;">Create account</a>
        </p>
        
        <p style="margin-top: 15px; font-size: 14px;">
            <a href="index.html" style="color:#666; text-decoration: none;">← Back to Home</a>
        </p>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const inputs = document.querySelectorAll('input');
            const email = inputs[0].value;
            const password = inputs[1].value;

            try {
                const response = await fetch('https://roboland-backend.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userRole', data.role);

                    alert("Login successful!");

                    if (data.role === 'admin') {
                        window.location.href = "admin-dashboard.html";
                    } else {
                        window.location.href = "dashboard.html";
                    }
                } else {
                    alert("Error: " + data.error);
                }
            } catch (error) {
                console.error("Fetch error:", error);
                alert("Cannot reach the server.");
            }
        });
    </script>
</body>
</html>
