</head>
<body class="auth-body">

    <!-- NAVBAR: Keep this if you want it visible on the login page -->
    <nav class="navbar">
        <div class="logo">🤖 ROBOLAND</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>

    <!-- LOGIN FORM: Updated classes below -->
    <div class="auth-container">
        <h2>Sign in</h2>
        <p>Continue to ROBOLAND</p>

        <form>
            <input type="email" class="auth-input" placeholder="Email" required>
            <input type="password" class="auth-input" placeholder="Password" required>
            <button type="submit" class="auth-btn">Login</button>
        </form>

        <br>
        <p style="text-align:center; color: #5f6368; font-size: 14px;">
            Don't have an account?
            <a href="register.html" style="color:#1a73e8; text-decoration: none;">
                Create account
            </a>
        </p>
    </div>

    <!-- ... footer stays same ... -->
</body>

<script>
    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevents the page from refreshing

        // Grab the email and password from the form
        const inputs = document.querySelectorAll('input');
        const email = inputs[0].value;
        const password = inputs[1].value;

      try {
        const response = await fetch('https://roboland-backend.onrender.com/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

       if (response.ok) {
            // Assuming your backend returns { "success": true, "role": "admin" }
            const userRole = data.role; 

            alert("Login successful! Welcome back.");

            if (userRole === 'admin') {
                window.location.href = "admin-dashboard.html"; // Redirect to Admin Page
            } else {
                window.location.href = "dashboard.html"; // Redirect to Normal Dashboard
            }
        } else {
            alert("Error: " + data.error);
        }
    });
</script>

</html>
