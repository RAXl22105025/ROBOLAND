<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .admin-table th, .admin-table td { padding: 12px; border: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>
    <div style="padding: 50px;">
        <h2>User Management</h2>
        <table class="admin-table" id="userTable">
            <thead>
                <tr>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        async function fetchUsers() {
            // Get your stored admin email from localStorage
            const adminEmail = localStorage.getItem('userEmail'); 

            const response = await fetch('https://roboland-backend.onrender.com/api/admin/users', {
                headers: { 'admin-email': adminEmail }
            });

            if (response.ok) {
                const users = await response.json();
                const tbody = document.querySelector('#userTable tbody');
                users.forEach(user => {
                    tbody.innerHTML += `<tr><td>${user.fullName}</td><td>${user.email}</td><td>${user.role}</td></tr>`;
                });
            } else {
                alert("Unauthorized access!");
                window.location.href = "login.html";
            }
        }
        fetchUsers();
    </script>
</body>
</html>
