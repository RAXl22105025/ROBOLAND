<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOLAND | Admin Dashboard</title>
    <!-- Links to your main style.css for design variables -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Admin-specific layout adjustments */
        body { padding: 50px 8%; }
        h2 { color: var(--primary); margin-bottom: 20px; text-shadow: 0 0 10px var(--primary); }
        
        .admin-table { 
            width: 100%; 
            border-collapse: collapse; 
            background: var(--card); 
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin-top: 20px;
        }
        .admin-table th { 
            background: var(--primary); 
            color: black; 
            padding: 15px; 
            text-align: left; 
        }
        .admin-table td { 
            padding: 15px; 
            border-bottom: 1px solid #333; 
            color: white; 
        }
        .admin-table tr:hover { background: #1a1a1a; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h2>User Management</h2>
        <button class="btn" onclick="logout()">Logout</button>
    </div>

    <table class="admin-table" id="userTable">
        <thead>
            <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Role</th>
            </tr>
        </thead>
        <tbody>
            <!-- Users will be injected here by JavaScript -->
        </tbody>
    </table>

    <script>
        // 1. Security Check: Immediately redirect if not authorized
        function checkAccess() {
            const adminEmail = localStorage.getItem('userEmail');
            const userRole = localStorage.getItem('userRole');

            if (!adminEmail || userRole !== 'admin') {
                alert("Unauthorized access! Redirecting to login.");
                window.location.href = "login.html";
            }
        }

        // 2. Fetch all users from Backend
        async function fetchUsers() {
            const adminEmail = localStorage.getItem('userEmail');

            try {
                const response = await fetch('https://roboland-backend.onrender.com/api/admin/users', {
                    headers: { 'admin-email': adminEmail }
                });

                if (response.ok) {
                    const users = await response.json();
                    const tbody = document.querySelector('#userTable tbody');
                    tbody.innerHTML = ""; // Clear table
                    
                    users.forEach(user => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${user.fullName}</td>
                                <td>${user.email}</td>
                                <td>${user.role}</td>
                            </tr>`;
                    });
                } else {
                    throw new Error("Unauthorized");
                }
            } catch (err) {
                alert("Session expired or unauthorized.");
                logout();
            }
        }

        // 3. Logout function
        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        // Initialize dashboard
        checkAccess();
        fetchUsers();
    </script>
</body>
</html>
