</body><script>
    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevents the page from refreshing

        // Grab the input fields based on their order in your HTML
        const inputs = document.querySelectorAll('input');
        const fullName = inputs[0].value;
        const email = inputs[1].value;
        const username = inputs[2].value;
        const password = inputs[3].value;
        const confirmPassword = inputs[4].value;
        const role = document.querySelector('select').value;

        // Simple validation
        if (password !== confirmPassword) {
            return alert("Passwords do not match!");
        }
        if (role === "") {
            return alert("Please select a role.");
        }

      // Send data to the backend
    try {
        const response = await fetch('https://roboland-backend.onrender.com/api/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ fullName, email, username, password, role })
        });

        const data = await response.json();

        if (response.ok) {
            alert("Registration successful! Please login.");
            window.location.href = "login.html"; // Redirect to your login page
        } else {
            alert("Error: " + data.error);
        }
    } catch (error) {
        console.error("Fetch error:", error);
        alert("Cannot reach the server. Is it running?");
    }
    });
</script>
