</head>

<body class="auth-body">

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">🤖 ROBOLAND</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <!-- REGISTER FORM -->
    <div class="auth-container">
        <h2>Create account</h2>
        <p>Join the ROBOLAND community</p>

        <form>
            <input type="text" class="auth-input" placeholder="Full Name" required>
            <input type="email" class="auth-input" placeholder="Email Address" required>
            <input type="text" class="auth-input" placeholder="Username" required>
            <input type="password" class="auth-input" placeholder="Password" required>
            <input type="password" class="auth-input" placeholder="Confirm Password" required>
            
            <select class="auth-input" required>
    <option value="">Select Role</option>
    <option value="Student">Student</option>
    <option value="Teacher">Teacher</option>
</select>

            <button type="submit" class="auth-btn">Register</button>
        </form>

        <br>
        <p style="text-align:center; color: #5f6368; font-size: 14px;">
            Already have an account?
            <a href="login.html" style="color:#1a73e8; text-decoration: none;">
                Login Here
            </a>
        </p>
    </div>

    <footer>
        <p>© 2026 ROBOLAND. All Rights Reserved.</p>
    </footer>

</body>
    <script>
    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevents the page from refreshing

        // Grab the input fields based on their order in your HTML
        const inputs = document.querySelectorAll('input');
        const fullName = inputs[0].value;
        const email = inputs[1].value;
        const username = inputs[2].value;
        const password = inputs[3].value;
        const confirmPassword = inputs[4].value;
        const role = document.querySelector('select').value;

        // Simple validation
        if (password !== confirmPassword) {
            return alert("Passwords do not match!");
        }
        if (role === "") {
            return alert("Please select a role.");
        }

      // Send data to the backend
    try {
        const response = await fetch('https://roboland-backend.onrender.com/api/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ fullName, email, username, password, role })
        });

        const data = await response.json();

        if (response.ok) {
            alert("Registration successful! Please login.");
            window.location.href = "login.html"; // Redirect to your login page
        } else {
            alert("Error: " + data.error);
        }
    } catch (error) {
        console.error("Fetch error:", error);
        alert("Cannot reach the server. Is it running?");
    }
    });
</script>



</html>
